<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <hr>
        <h1>WDD130 / HTML Form - User Poll</h1>
    </header>
    <form>
        <fieldset>
            <legend>Contact information</legend>
            <div class="form-item column2">
                <label for="fullname">Full name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-item column2">
                <label for="useremail">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>
        </fieldset>
        <fieldset>
            <legend>Question</legend>
            <div class="form-item column1">
                <label for="browser">What is you favorite browser?</label>
                <select name="browser" id="browser">
                    <option value="1">Chrome</option>
                    <option value="2">Brave</option>
                    <option value="3">Edge</option>
                    <option value="4">Opera</option>
                </select>
            </div>
            <div class="form-item column1">
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">
            </div>
            <label for="feedback">List the places you have lived:</label>
            <textarea name="feedback" id="feedback" rows="4"
              placeholder="Buenos Aires, Santiago, Asuncion "></textarea>
        </fieldset>
        <button type="submit">Submit Poll</button>
    </form>
    <footer>
        <p>©2026 🏵️ HTML Form - User Poll Activity 🏵️ Melina Benitez Bogarín. </p>
    </footer>
</body>

</html>
