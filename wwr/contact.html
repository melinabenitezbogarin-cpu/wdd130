<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us of Splash Rafting Company</title>
    <meta name="description"
      content="The Splash! Rafting Site is a website belongs to a company that organizes trips,its goal is to learn more about them and sell their services.">
    <meta name="author" content="Melina Benitez Bogarín">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="horizontal-layout"> <img src="images/logo.png"
          alt="Logo Splash Whitewater Rafting">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact">
            <h1>Contact Splash Water Rafting Company</h1>
            <p>Reserva Natural Puerto Mar del Plata</p>
            <p>Buenos Aires</p>
            <P>+541145796455</P>
            <P>splashrafting@gmail.com</P>
        </div>
        <div class="information">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3661.814878323661!2d-57.54343201857494!3d-38.05842636074452!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9584dd2aeb4b0eb5%3A0xb521be7d0fce5eeb!2sReserva%20Natural%20Puerto%20Mar%20del%20Plata!5e1!3m2!1ses!2sar!4v1775772166322!5m2!1ses!2sar"
                  width="400" height="400" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>

            </div>

            <form>
                <div class="form-item-column1">
                    <label for="fullname">Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-item-column1">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-item-column2">
                    <div class="label">Message Purpose</div>

                    <div class="options">
                        <label><input type="radio" name="purpose" id="purpose"> General
                            Inquiry</label>
                        <label><input type="radio" name="purpose" id="reservation"> Reservation
                            Question</label>
                        <label><input type="radio" name="purpose" id="suggestion"> Website
                            Suggestion</label>
                    </div>
                </div>
                <div class="form-item-column3">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="4"
                      placeholder="Type here "></textarea>
                    <input type="checkbox" id="news" name="news">
                    <label for="news">Please suscribe me to the monthly newsletter</label>

                </div>
                <button type="submit">Get in Touch!</button>
            </form>
        </div>
        <section>
            <h2 class="subtitle">We are here to serve you</h2>
            <div class="figures">
                <figure> <img src="images/oliviamartinez.jpg" alt="Olivia Martinez">
                    <figcaption>Olivia Martinez</figcaption>
                </figure>
                <figure> <img src="images/lenietong.jpg" alt="Lenie Tong">
                    <figcaption>Lenie Tong</figcaption>
                </figure>
                <figure> <img src="images/elliejhonson.jpg" alt="Ellie Jhonson">
                    <figcaption>Ellie Jhonson</figcaption>
                </figure>
                <figure> <img src="images/cameronbrown.jpg" alt="Cameron Brown">
                    <figcaption>Cameron Brown</figcaption>
                </figure>
                <figure> <img src="images/muffintwins.jpg" alt="Muffin Twins">
                    <figcaption>The Muffin Twins</figcaption>
                </figure>
            </div>
        </section>

    </main>
    <footer class="flex-container">
        <div class="flex-item1">
            <p>©2026 🏵️ Splash! Rafting Company 🏵️ Melina Benitez Bogarín </p>
        </div>
        <nav class="socialmedia"> <a href="https://facebook.com"> <img src="images/facebook.svg"
                  alt="Facebool Icon"> </a> <a href="https://linkedin.com"> <img
                  src="images/linkedin.svg" alt="Linkedin Icon"> </a> <a
              href="https://instagram.com"> <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
